<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trippie Chomp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100dvh; overflow: hidden; background: #0D0D1A; font-family: 'Press Start 2P', monospace; touch-action: none; user-select: none; -webkit-user-select: none; }
#game-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; background: url('game-bg.png') center bottom / cover no-repeat; }
#hud { display: none; color: #fff; font-size: 14px; padding: 8px 12px; width: 100%; max-width: 400px; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 2; }
#hud span { display: inline-flex; align-items: center; gap: 4px; }
#hud .lives-display { display: inline-flex; align-items: center; gap: 2px; }
#hud .lives-display img { width: 20px; height: 20px; image-rendering: pixelated; }
#canvas-wrap { display: flex; align-items: center; justify-content: center; flex: 0 0 auto; z-index: 1; }
canvas { display: block; image-rendering: pixelated; }

/* Start Screen */
#start-screen { position: fixed; inset: 0; z-index: 20; background: url('game-over-bg.png') center bottom / cover no-repeat; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; padding: 20px; }
.ss-trippie { width: 160px; height: auto; image-rendering: pixelated; margin-bottom: 20px; filter: drop-shadow(0 4px 24px rgba(128,0,255,0.4)); }
.ss-title { color: #fff; font-size: 18px; text-align: center; line-height: 1.6; margin-bottom: 16px; letter-spacing: 2px; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
.ss-desc { color: rgba(255,255,255,0.7); font-size: 8px; text-align: center; line-height: 1.8; margin-bottom: 28px; letter-spacing: 1px; max-width: 280px; }
.ss-btn { background: #00D2C8; color: #0D0D1A; border: none; border-radius: 30px; padding: 16px 48px; font-family: 'Press Start 2P', monospace; font-size: 12px; letter-spacing: 2px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,210,200,0.4); }
.ss-btn:active { background: #00b5ad; }
.ss-tcs { color: rgba(255,255,255,0.25); font-size: 7px; margin-top: 20px; }

/* Game Over Screen */
#gameover-screen { position: fixed; inset: 0; z-index: 20; display: none; flex-direction: column; align-items: center; justify-content: center; background: url('game-over-bg.png') center bottom / cover no-repeat; overflow-y: auto; padding: 16px; }
.go-card { background: rgba(30, 20, 50, 0.75); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 24px 20px 20px; max-width: 360px; width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
.go-title { color: #fff; font-size: 18px; margin-bottom: 16px; text-align: center; letter-spacing: 2px; }
.go-trippie { width: 200px; height: auto; margin-bottom: 12px; image-rendering: pixelated; }
.go-savings { color: #FFD700; font-size: 16px; margin-bottom: 20px; text-align: center; letter-spacing: 1px; }
.go-stats { display: flex; gap: 8px; width: 100%; margin-bottom: 20px; }
.go-stat { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 6px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.go-stat-label { color: rgba(255,255,255,0.65); font-size: 7px; line-height: 1.4; text-transform: uppercase; letter-spacing: 0.5px; }
.go-stat-val { color: #fff; font-size: 18px; font-weight: bold; }
.go-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; }
.go-btn { width: 100%; padding: 14px 8px; border: none; border-radius: 10px; font-family: 'Press Start 2P', monospace; cursor: pointer; text-align: center; letter-spacing: 0.5px; }
.go-btn-share { background: #00D2C8; color: #0D0D1A; font-size: 10px; padding: 16px 8px; }
.go-btn-share:active { background: #00b5ad; }
.go-btn-play { background: transparent; color: rgba(255,255,255,0.6); font-size: 8px; border: 1px solid rgba(255,255,255,0.2); padding: 12px 8px; }
.go-btn-play:active { background: rgba(255,255,255,0.1); }
.go-cta-line { color: rgba(255,255,255,0.5); font-size: 7px; text-align: center; line-height: 1.6; margin-top: 4px; letter-spacing: 0.5px; }
.go-tcs { color: rgba(255,255,255,0.3); font-size: 7px; margin-top: 12px; }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <img src="trippie-face.png" class="ss-trippie" alt="Trippie">
  <div class="ss-title">CHOMP YOUR WAY<br>TO THE BEST RATES</div>
  <div class="ss-desc">EAT CURRENCIES. DODGE FEE MONSTERS. STACK SAVINGS TO GET THE HIGHEST SCORE.</div>
  <button class="ss-btn" id="ss-play-btn">PLAY NOW</button>
  <div class="ss-tcs">*T&Cs apply.</div>
</div>

<!-- Game Over Screen -->
<div id="gameover-screen">
  <div class="go-card">
    <div class="go-title">GAME OVER</div>
    <img src="trippie-coins.png" class="go-trippie" alt="Trippie">
    <div class="go-savings" id="go-savings">YOU SAVED S$0!</div>
    <div class="go-stats">
      <div class="go-stat">
        <span class="go-stat-label">CURRENCIES<br>EATEN</span>
        <span class="go-stat-val" id="go-currencies">0</span>
      </div>
      <div class="go-stat">
        <span class="go-stat-label">LEVEL<br>REACHED</span>
        <span class="go-stat-val" id="go-level">1</span>
      </div>
      <div class="go-stat">
        <span class="go-stat-label">FEE MONSTERS<br>EATEN</span>
        <span class="go-stat-val" id="go-ghosts-eaten">0</span>
      </div>
    </div>
    <div class="go-buttons">
      <button class="go-btn go-btn-share" id="go-share-btn">SHARE ON INSTAGRAM</button>
      <button class="go-btn go-btn-play" id="go-play-btn">PLAY AGAIN</button>
    </div>
    <div class="go-cta-line">SHARE ON IG & STAND A CHANCE<br>TO WIN A YEAR OF TRAVEL ON US</div>
  </div>
  <div class="go-tcs">*T&Cs apply.</div>
</div>

<!-- Game -->
<div id="game-wrapper">
  <div id="hud">
    <span>SCORE: <b id="score-val">0</b></span>
    <span>LVL: <b id="level-val">1</b></span>
    <span class="lives-display" id="lives-val"></span>
  </div>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
</div>
